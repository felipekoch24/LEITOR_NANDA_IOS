<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLIOTECA DA NANDA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #282a36; color: #f8f8f2; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #main-screen { padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow-y: auto; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #ff79c6; width: 100%; padding-bottom: 15px; }
        h1 { color: #ff79c6; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-upload { 
            width: 100%; max-width: 400px; background: linear-gradient(135deg, #ff79c6 0%, #bd93f9 100%);
            color: #282a36; text-align: center; padding: 18px; border-radius: 15px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 20px;
        }

        .lista { width: 100%; max-width: 400px; display: grid; gap: 10px; }
        .item-livro { 
            background: #44475a; border-radius: 12px; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        /* TELA DO LEITOR (SÉPIA E PÁGINAS) */
        #reader-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf6e3; z-index: 1000; flex-direction: column; }
        #viewer { flex: 1; width: 100%; position: relative; color: #333; }
        
        /* Área de toque para passar página */
        .touch-zone { position: absolute; top: 60px; height: calc(100% - 60px); width: 25%; z-index: 1001; }
        #next-zone { right: 0; }
        #prev-zone { left: 0; }

        .nav-bar { height: 60px; background: #282a36; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1002; }
        .btn-close { background: #ff5555; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 10px; }
        .info { color: #ff79c6; font-size: 10px; font-weight: bold; }

        /* Estilo do PDF como Livro */
        .pdf-page-container { width: 100%; height: 100%; display: none; padding: 20px; overflow-y: auto; align-items: center; flex-direction: column; }
        .pdf-page-container.active { display: flex; }
        canvas { max-width: 100%; height: auto !important; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="main-screen">
        <header><h1>BIBLIOTECA DA NANDA</h1></header>
        <label for="file-input" class="btn-upload">📂 ABRIR LIVRO</label>
        <input type="file" id="file-input" style="display:none" accept=".epub,.pdf">
        <div class="lista" id="lista-nuvem"></div>
    </div>

    <div id="reader-screen">
        <div id="prev-zone" class="touch-zone" onclick="prev()"></div>
        <div id="next-zone" class="touch-zone" onclick="next()"></div>
        
        <div class="nav-bar">
            <button class="btn-close" onclick="closeReader()">FECHAR</button>
            <div class="info" id="book-title">LENDO...</div>
            <div style="width:50px"></div>
        </div>
        <div id="viewer"></div>
    </div>

    <script>
        const USER = 'felipekoch24';
        const REPO = 'LEITOR_NANDA_IOS';
        let rendition;
        let pdfDoc = null;
        let currentPdfPage = 1;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function openBook(url, name) {
            const ext = name.split('.').pop().toLowerCase();
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('reader-screen').style.display = 'flex';
            document.getElementById('book-title').innerText = name.split('.')[0].substring(0,15);
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = "";
            
            if (ext === 'epub') {
                const book = ePub(url);
                rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
                const pos = localStorage.getItem('pos_' + name);
                rendition.display(pos || undefined);
                rendition.on("relocated", loc => localStorage.setItem('pos_' + name, loc.start.cfi));
            } 
            else if (ext === 'pdf') {
                rendition = null;
                const loading = pdfjsLib.getDocument(url);
                pdfDoc = await loading.promise;
                currentPdfPage = parseInt(localStorage.getItem('page_' + name)) || 1;
                renderPdfPage(currentPdfPage, name);
            }
        }

        async function renderPdfPage(num, name) {
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = `<div class="pdf-page-container active" id="p${num}"></div>`;
            const page = await pdfDoc.getPage(num);
            
            // O segredo do zoom: Ajusta o PDF exatamente na largura da tela
            const viewport = page.getViewport({ scale: 1 });
            const scale = (window.innerWidth - 40) / viewport.width;
            const scaledViewport = page.getViewport({ scale: scale * 1.2 });

            const canvas = document.createElement('canvas');
            canvas.height = scaledViewport.height;
            canvas.width = scaledViewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaledViewport }).promise;
            
            document.getElementById(`p${num}`).appendChild(canvas);
            localStorage.setItem('page_' + name, num);
        }

        function next() {
            const name = localStorage.getItem('ultimo_livro');
            if (rendition) rendition.next();
            else if (pdfDoc && currentPdfPage < pdfDoc.numPages) {
                currentPdfPage++;
                renderPdfPage(currentPdfPage, name);
            }
        }

        function prev() {
            const name = localStorage.getItem('ultimo_livro');
            if (rendition) rendition.prev();
            else if (pdfDoc && currentPdfPage > 1) {
                currentPdfPage--;
                renderPdfPage(currentPdfPage, name);
            }
        }

        function closeReader() {
            document.getElementById('main-screen').style.display = 'flex';
            document.getElementById('reader-screen').style.display = 'none';
        }

        async function fetchBooks() {
            const container = document.getElementById('lista-nuvem');
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
            const files = await res.json();
            container.innerHTML = '';
            files.forEach(f => {
                if (['pdf','epub'].includes(f.name.split('.').pop().toLowerCase())) {
                    container.innerHTML += `<div class="item-livro" onclick="localStorage.setItem('ultimo_livro','${f.name}'); openBook('${f.download_url}', '${f.name}')">
                        <b style="font-size:13px">${f.name.split('.')[0]}</b>
                        <b style="color:#ff79c6">LER ></b>
                    </div>`;
                }
            });
        }

        document.getElementById('file-input').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                localStorage.setItem('ultimo_livro', f.name);
                openBook(URL.createObjectURL(f), f.name);
            }
        });

        fetchBooks();
    </script>
</body>
</html>
