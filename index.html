<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLIOTECA DA NANDA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #282a36; color: #f8f8f2; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #main-screen { padding: 20px; height: 100vh; overflow-y: auto; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #ff79c6; padding-bottom: 15px; }
        .btn-upload { width: 100%; background: #ff79c6; color: #282a36; text-align: center; padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; display: block; margin-bottom: 20px; border: none; font-size: 18px; }
        .item-livro { background: #44475a; border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 5px solid #ff79c6; }

        #reader-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf6e3; z-index: 1000; flex-direction: column; }
        .nav-bar { height: 60px; background: #282a36; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1010; }
        
        #viewer { flex: 1; width: 100%; position: relative; z-index: 1001; }
        #touch-layer { position: absolute; top: 60px; bottom: 100px; left: 0; right: 0; z-index: 1005; background: transparent; }

        .footer-nav { height: 100px; background: #282a36; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1010; padding-bottom: 10px; }
        .pages-info { color: #ff79c6; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .controls { display: flex; gap: 40px; width: 100%; justify-content: center; }

        .btn { border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; font-size: 12px; color: white; cursor: pointer; }
        .btn-close { background: #ff5555; }
        .btn-audio { background: #50fa7b; color: #282a36; min-width: 100px; font-size: 14px; }
        .btn-page { background: #6272a4; padding: 12px 45px; font-size: 25px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <header><h1>BIBLIOTECA DA NANDA</h1></header>
        <label for="file-input" class="btn-upload">📂 ABRIR LIVRO (.EPUB)</label>
        <input type="file" id="file-input" style="display:none" accept=".epub">
        <div id="lista-nuvem">Carregando seus livros...</div>
    </div>

    <div id="reader-screen">
        <div class="nav-bar">
            <button class="btn btn-close" onclick="closeReader()">FECHAR</button>
            <button class="btn btn-audio" id="btn-audio" onclick="toggleAudio()">🔊 OUVIR</button>
        </div>
        
        <div id="touch-layer"></div>
        <div id="viewer"></div>

        <div class="footer-nav">
            <div class="pages-info" id="page-counter">Página -- de --</div>
            <div class="controls">
                <button class="btn btn-page" onclick="prev()">⬅</button>
                <button class="btn btn-page" onclick="next()">➡</button>
            </div>
        </div>
    </div>

    <script>
        const USER = 'felipekoch24', REPO = 'LEITOR_NANDA_IOS';
        let rendition, currentBook, isReading = false;
        let startX = 0;

        async function openBook(url, name) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('reader-screen').style.display = 'flex';
            
            if(currentBook) currentBook.destroy();
            
            currentBook = ePub(url);
            rendition = currentBook.renderTo("viewer", {
                width: "100%", height: "100%", flow: "paginated", manager: "default"
            });

            // Letra Ultra Gigante (32px) e espaçamento para facilitar leitura
            rendition.themes.default({
                "body": { "padding": "15px !important" },
                "p": { "font-size": "32px !important", "line-height": "1.4 !important", "color": "#000 !important", "margin-bottom": "20px !important" },
                "div": { "font-size": "32px !important" }
            });

            const savedPos = localStorage.getItem('pos_' + name);
            await rendition.display(savedPos || undefined);

            currentBook.ready.then(() => {
                return currentBook.locations.generate(1000);
            }).then(() => updateProgress(name));

            rendition.on("relocated", () => updateProgress(name));
        }

        function updateProgress(name) {
            if (rendition && rendition.currentLocation()) {
                const loc = rendition.currentLocation();
                const cur = loc.start.displayed.page;
                const total = loc.start.displayed.total;
                document.getElementById('page-counter').innerText = `Página ${cur} de ${total}`;
                if(name) localStorage.setItem('pos_' + name, loc.start.cfi);
            }
        }

        const touchLayer = document.getElementById('touch-layer');
        touchLayer.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        touchLayer.addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) next(); else prev();
            }
        });

        function next() { window.speechSynthesis.cancel(); rendition.next(); }
        function prev() { window.speechSynthesis.cancel(); rendition.prev(); }

        // SISTEMA DE ÁUDIO REFORÇADO
        function toggleAudio() {
            if (isReading) { 
                window.speechSynthesis.cancel(); 
                isReading = false; 
                document.getElementById('btn-audio').innerText = "🔊 OUVIR";
                return; 
            }
            
            const loc = rendition.currentLocation();
            const section = currentBook.spine.get(loc.start.cfi);
            
            section.load(currentBook.load.bind(currentBook)).then(doc => {
                const text = doc.body.innerText || doc.body.textContent;
                const utter = new SpeechSynthesisUtterance(text.trim());
                utter.lang = 'pt-BR';
                utter.rate = 0.9; // Um pouco mais lento para clareza
                
                utter.onstart = () => {
                    isReading = true;
                    document.getElementById('btn-audio').innerText = "⏹ PARAR";
                };
                utter.onend = () => {
                    isReading = false;
                    document.getElementById('btn-audio').innerText = "🔊 OUVIR";
                };
                
                window.speechSynthesis.speak(utter);
            });
        }

        function closeReader() { window.speechSynthesis.cancel(); location.reload(); }

        async function fetchBooks() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const files = await res.json();
                const container = document.getElementById('lista-nuvem');
                container.innerHTML = '';
                files.forEach(f => {
                    if (f.name.toLowerCase().endsWith('.epub')) {
                        container.innerHTML += `<div class="item-livro" onclick="openBook('${f.download_url}', '${f.name}')"><b>${f.name.replace('.epub', '')}</b><span>LER</span></div>`;
                    }
                });
            } catch(e) { console.log("Erro na lista"); }
        }
        fetchBooks();
    </script>
</body>
</html>
