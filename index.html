<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIBLIOTECA DA NANDA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
    background:#282a36;
    color:#fff;
    font-family:sans-serif;
    overflow:hidden;
}

#main-screen {
    padding:20px;
    height:100vh;
    overflow:auto;
}

header {
    text-align:center;
    margin-bottom:20px;
}

.btn-upload {
    display:block;
    width:100%;
    padding:20px;
    background:#ff79c6;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.item-livro {
    background:#444;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

#reader-screen {
    display:none;
    position:fixed;
    inset:0;
    background:#fdf6e3;
    flex-direction:column;
}

.nav-bar {
    height:60px;
    background:#282a36;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

#viewer {
    flex:1;
}

#touch-layer {
    position:absolute;
    top:60px;
    bottom:100px;
    left:0;
    right:0;
}

.footer-nav {
    height:100px;
    background:#282a36;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.btn {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.btn-page {
    font-size:25px;
}

</style>

</head>

<body>

<div id="main-screen">
<header><h1>BIBLIOTECA DA NANDA</h1></header>
<input type="file" id="file-input" style="display:none" accept=".epub">
<div id="lista-nuvem"></div>
</div>

<div id="reader-screen">
<div class="nav-bar">
<button class="btn" onclick="closeReader()">FECHAR</button>
<button class="btn" id="btn-audio" onclick="toggleAudio()">🔊 OUVIR</button>
</div>

<div id="touch-layer"></div>
<div id="viewer"></div>

<div class="footer-nav">
<button class="btn btn-page" onclick="prev()">⬅</button>
<button class="btn btn-page" onclick="next()">➡</button>
</div>
</div>

<script>
const USER = 'felipekoch24';
const REPO = 'LEITOR_NANDA_IOS';

let rendition, currentBook, isReading=false;
let startX=0;

// ===== AUDIO =====
let utterQueue = [];
let speakingIndex = 0;

speechSynthesis.onvoiceschanged = () => {};

function splitText(text, size=120){
    const chunks=[];
    for(let i=0;i<text.length;i+=size){
        chunks.push(text.slice(i,i+size));
    }
    return chunks;
}

function getVoice(){
    const voices = speechSynthesis.getVoices();
    return voices.find(v=>v.lang.includes("pt")) || voices[0];
}

function speakQueue(){
    if(speakingIndex>=utterQueue.length){
        isReading=false;
        document.getElementById('btn-audio').innerText="🔊 OUVIR";
        return;
    }

    const utter = utterQueue[speakingIndex];

    utter.onend=()=>{
        speakingIndex++;
        speakQueue();
    };

    speechSynthesis.speak(utter);
}

function toggleAudio(){
    if(isReading){
        speechSynthesis.cancel();
        isReading=false;
        document.getElementById('btn-audio').innerText="🔊 OUVIR";
        return;
    }

    const loc = rendition.currentLocation();
    const section = currentBook.spine.get(loc.start.cfi);

    section.load(currentBook.load.bind(currentBook)).then(doc=>{
        let text = doc.body.innerText || doc.body.textContent;
        text = text.replace(/\s+/g," ").trim();

        const parts = splitText(text,120);
        const voice = getVoice();

        utterQueue = parts.map(p=>{
            const u = new SpeechSynthesisUtterance(p);
            u.lang="pt-BR";
            u.rate=0.9;
            u.pitch=1;
            u.voice=voice;
            return u;
        });

        speakingIndex=0;
        isReading=true;
        document.getElementById('btn-audio').innerText="⏹ PARAR";

        speechSynthesis.cancel();
        setTimeout(()=>speakQueue(),150);
    });
}

// ===== LIVRO =====
async function openBook(url,name){
    document.getElementById('main-screen').style.display='none';
    document.getElementById('reader-screen').style.display='flex';

    if(currentBook) currentBook.destroy();

    currentBook = ePub(url);

    rendition = currentBook.renderTo("viewer",{
        width:"100%",
        height:"100%",
        flow:"paginated"
    });

    // LETRA GRANDE
    rendition.themes.default({
        "body": { "padding":"15px" },
        "p": {
            "font-size":"36px",
            "line-height":"1.4",
            "color":"#000"
        },
        "div": { "font-size":"36px" }
    });

    await rendition.display();
}

// swipe
const touchLayer = document.getElementById('touch-layer');

touchLayer.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
});

touchLayer.addEventListener('touchend', e=>{
    const diff = startX - e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){
        if(diff>0) next();
        else prev();
    }
});

function next(){
    speechSynthesis.cancel();
    rendition.next();
}

function prev(){
    speechSynthesis.cancel();
    rendition.prev();
}

function closeReader(){
    speechSynthesis.cancel();
    location.reload();
}

// lista github
async function fetchBooks(){
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
    const files = await res.json();

    const container = document.getElementById('lista-nuvem');
    files.forEach(f=>{
        if(f.name.endsWith('.epub')){
            container.innerHTML += `<div class="item-livro" onclick="openBook('${f.download_url}','${f.name}')">${f.name}</div>`;
        }
    });
}

fetchBooks();
</script>

</body>
</html>
