<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIBLIOTECA DA NANDA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#282a36;color:#fff;font-family:sans-serif;overflow:hidden;}

#main-screen{padding:20px;height:100vh;overflow:auto;}
.item-livro{background:#444;padding:15px;margin:10px 0;border-radius:10px;cursor:pointer;}

#reader-screen{display:none;position:fixed;inset:0;background:#fdf6e3;flex-direction:column;}

.nav-bar{height:60px;background:#282a36;display:flex;justify-content:space-between;align-items:center;padding:10px;}

#viewer{flex:1;}

.footer-nav{height:100px;background:#282a36;display:flex;justify-content:center;align-items:center;gap:20px;}

.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;}
.btn-page{font-size:25px;}
</style>

</head>

<body>

<div id="main-screen">
<h2>BIBLIOTECA DA NANDA</h2>
<div id="lista-nuvem"></div>
</div>

<div id="reader-screen">
<div class="nav-bar">
<button class="btn" onclick="closeReader()">FECHAR</button>
<button class="btn" id="btn-audio" onclick="toggleAudio()">🔊 OUVIR</button>
</div>

<div id="viewer"></div>

<div class="footer-nav">
<button class="btn btn-page" onclick="prev()">⬅</button>
<button class="btn btn-page" onclick="next()">➡</button>
</div>
</div>

<script>
const USER='felipekoch24';
const REPO='LEITOR_NANDA_IOS';

let rendition,currentBook,isReading=false;

// ===== SWIPE =====
let startX=0;

document.addEventListener('touchstart',e=>{
 startX=e.touches[0].clientX;
},{passive:true});

document.addEventListener('touchend',e=>{
 let diff=startX-e.changedTouches[0].clientX;
 if(Math.abs(diff)>50){
   if(diff>0) next();
   else prev();
 }
});

// ===== TECLADO (NOTEBOOK) =====
document.addEventListener("keydown",(e)=>{
 if(document.getElementById('reader-screen').style.display!=='flex') return;
 if(e.key==="ArrowRight") next();
 if(e.key==="ArrowLeft") prev();
});

// ===== ÁUDIO =====
let utterQueue=[];
let speakingIndex=0;

speechSynthesis.onvoiceschanged=()=>{};

function splitText(text,size=120){
 let chunks=[];
 for(let i=0;i<text.length;i+=size){
  chunks.push(text.slice(i,i+size));
 }
 return chunks;
}

function getVoice(){
 let voices=speechSynthesis.getVoices();
 return voices.find(v=>v.lang.includes("pt"))||voices[0];
}

function speakQueue(){
 if(speakingIndex>=utterQueue.length){
  isReading=false;
  document.getElementById('btn-audio').innerText="🔊 OUVIR";
  return;
 }

 let u=utterQueue[speakingIndex];

 u.onend=()=>{
  speakingIndex++;
  speakQueue();
 };

 speechSynthesis.speak(u);
}

function toggleAudio(){
 if(isReading){
  speechSynthesis.cancel();
  isReading=false;
  document.getElementById('btn-audio').innerText="🔊 OUVIR";
  return;
 }

 let loc=rendition.currentLocation();
 let section=currentBook.spine.get(loc.start.cfi);

 section.load(currentBook.load.bind(currentBook)).then(doc=>{

  let text=doc.documentElement.innerText;
  text=text.replace(/\s+/g," ").trim();

  if(!text){
   alert("Sem texto nessa página");
   return;
  }

  let parts=splitText(text,120);
  let voice=getVoice();

  utterQueue=parts.map(p=>{
   let u=new SpeechSynthesisUtterance(p);
   u.lang="pt-BR";
   u.rate=0.9;
   if(voice) u.voice=voice;
   return u;
  });

  speakingIndex=0;
  isReading=true;
  document.getElementById('btn-audio').innerText="⏹ PARAR";

  speechSynthesis.cancel();
  setTimeout(()=>speakQueue(),200);
 });
}

// ===== LIVRO =====
async function openBook(url,name){
 document.getElementById('main-screen').style.display='none';
 document.getElementById('reader-screen').style.display='flex';

 if(currentBook) currentBook.destroy();

 currentBook=ePub(url);

 rendition=currentBook.renderTo("viewer",{
  width:"100%",
  height:"100%",
  flow:"paginated"
 });

 // LETRA GRANDE
 rendition.themes.default({
  "body":{"padding":"15px"},
  "p":{"font-size":"36px","line-height":"1.4","color":"#000"},
  "div":{"font-size":"36px"}
 });

 await rendition.display();
}

// ===== NAV =====
function next(){
 speechSynthesis.cancel();
 rendition.next();
}

function prev(){
 speechSynthesis.cancel();
 rendition.prev();
}

function closeReader(){
 speechSynthesis.cancel();
 location.reload();
}

// ===== LISTA =====
async function fetchBooks(){
 let res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
 let files=await res.json();

 let container=document.getElementById('lista-nuvem');

 files.forEach(f=>{
  if(f.name.endsWith('.epub')){
   container.innerHTML+=`<div class="item-livro" onclick="openBook('${f.download_url}','${f.name}')">${f.name}</div>`;
  }
 });
}

fetchBooks();
</script>

</body>
</html>
