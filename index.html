<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIBLIOTECA DA NANDA PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#282a36; color:#fff; }

#main { padding:20px; }
.book { background:#444; padding:15px; margin:10px 0; border-radius:10px; cursor:pointer; }

#reader { display:none; position:fixed; inset:0; background:#fff; color:#000; }

.top { height:60px; background:#222; display:flex; align-items:center; justify-content:space-between; padding:10px; }
.btn { padding:10px; border:none; border-radius:8px; cursor:pointer; }

#viewer { height:calc(100% - 140px); }

.bottom { height:80px; background:#222; display:flex; justify-content:center; gap:10px; align-items:center; }

.night { background:#111 !important; color:#eee !important; }
.highlight { background:yellow; }
</style>

</head>

<body>

<div id="main">
<h2>BIBLIOTECA</h2>
<div id="books"></div>
</div>

<div id="reader">
<div class="top">
<button class="btn" onclick="closeReader()">FECHAR</button>
<button class="btn" onclick="toggleAudio()">🔊</button>
<button class="btn" onclick="toggleNight()">🌙</button>
</div>

<div id="viewer"></div>

<div class="bottom">
<button class="btn" onclick="prev()">⬅</button>
<button class="btn" onclick="next()">➡</button>
<button class="btn" onclick="skipParagraph()">⏩ P</button>
<button class="btn" onclick="nextChapter()">📖 ➡</button>
</div>
</div>

<script>
const USER = 'felipekoch24';
const REPO = 'LEITOR_NANDA_IOS';
const TOKEN = ''; // opcional GitHub token

let book, rendition;
let currentBookName = "";
let utterances = [], index = 0, isReading=false;

// ================= LIVROS =================
async function loadBooks(){
 const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
 const data = await res.json();

 const container = document.getElementById('books');
 data.forEach(f=>{
  if(f.name.endsWith('.epub')){
    container.innerHTML += `<div class="book" onclick="openBook('${f.download_url}','${f.name}')">${f.name}</div>`;
  }
 });
}

// ================= ABRIR =================
async function openBook(url,name){
 currentBookName = name;

 document.getElementById('main').style.display='none';
 document.getElementById('reader').style.display='block';

 book = ePub(url);
 rendition = book.renderTo("viewer",{width:"100%",height:"100%"});

 const pos = await loadCloud(name);
 rendition.display(pos || undefined);

 rendition.on("relocated", loc=>{
   saveCloud(name, loc.start.cfi);
 });
}

// ================= NAVEGAÇÃO =================
function next(){ speechSynthesis.cancel(); rendition.next(); }
function prev(){ speechSynthesis.cancel(); rendition.prev(); }

function nextChapter(){
 speechSynthesis.cancel();
 book.spine.get(book.spine.pos + 1).load(book.load.bind(book)).then(()=>{
   rendition.display(book.spine.get(book.spine.pos + 1).href);
 });
}

// pular parágrafo
function skipParagraph(){
 speechSynthesis.cancel();
 index += 5;
 speakNext();
}

// ================= ÁUDIO =================
function splitText(text){
 return text.match(/.{1,200}/g);
}

function getVoice(){
 return speechSynthesis.getVoices().find(v=>v.lang.includes('pt')) || speechSynthesis.getVoices()[0];
}

function speakNext(){
 if(index>=utterances.length){
   isReading=false;
   return;
 }

 let u = utterances[index];

 u.onend=()=>{
   index++;
   localStorage.setItem("audio_"+currentBookName,index);
   speakNext();
 };

 speechSynthesis.speak(u);
}

function toggleAudio(){
 if(isReading){
   speechSynthesis.cancel();
   isReading=false;
   return;
 }

 const loc = rendition.currentLocation();
 const section = book.spine.get(loc.start.cfi);

 section.load(book.load.bind(book)).then(doc=>{
   const text = doc.body.innerText;

   const parts = splitText(text);
   const voice = getVoice();

   utterances = parts.map(p=>{
     let u = new SpeechSynthesisUtterance(p);
     u.lang='pt-BR';
     u.rate=0.85;
     u.pitch=1.1;
     u.voice=voice;
     return u;
   });

   index = parseInt(localStorage.getItem("audio_"+currentBookName)) || 0;
   isReading=true;

   speakNext();
 });
}

// ================= MODO NOTURNO =================
function toggleNight(){
 document.getElementById('reader').classList.toggle('night');
 localStorage.setItem('night',document.getElementById('reader').classList.contains('night'));
}

window.onload=()=>{
 if(localStorage.getItem('night')==='true'){
   document.getElementById('reader').classList.add('night');
 }
};

// ================= CLOUD (GitHub) =================
async function saveCloud(name,pos){
 if(!TOKEN) return;

 const content = btoa(JSON.stringify({pos}));

 await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/progress_${name}.json`,{
  method:'PUT',
  headers:{
    Authorization:`token ${TOKEN}`,
    'Content-Type':'application/json'
  },
  body:JSON.stringify({
    message:'save progress',
    content
  })
 });
}

async function loadCloud(name){
 try{
  const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/progress_${name}.json`);
  const data = await res.json();
  return data.pos;
 }catch(e){
  return null;
 }
}

// ================= FECHAR =================
function closeReader(){
 speechSynthesis.cancel();
 location.reload();
}

loadBooks();
</script>

</body>
</html>
