<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLIOTECA DA NANDA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #282a36; color: #f8f8f2; font-family: sans-serif; overflow: hidden; }
        
        #main-screen { padding: 30px; height: 100vh; overflow-y: auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #ff79c6; padding-bottom: 15px; }
        .item-livro { background: #44475a; border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #ff79c6; font-size: 18px; cursor: pointer; }

        #reader-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; flex-direction: column; }
        .nav-bar { height: 70px; background: #282a36; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1010; }
        
        #viewer { flex: 1; width: 100%; z-index: 1001; }
        #touch-layer { position: absolute; top: 70px; bottom: 120px; left: 0; right: 0; z-index: 1005; background: transparent; }

        .footer-nav { height: 120px; background: #282a36; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1010; padding-bottom: 10px; }
        .pages-info { color: #ff79c6; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .controls { display: flex; gap: 30px; width: 90%; justify-content: center; }

        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-close { background: #ff5555; color: white; padding: 10px 20px; }
        .btn-audio { background: #50fa7b; color: #282a36; padding: 10px 25px; font-size: 16px; min-width: 120px; }
        .btn-page { background: #6272a4; color: white; flex: 1; max-width: 200px; height: 65px; font-size: 40px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <header><h1>BIBLIOTECA DA NANDA</h1></header>
        <div id="lista-nuvem">Carregando acervo...</div>
    </div>

    <div id="reader-screen">
        <div class="nav-bar">
            <button class="btn btn-close" onclick="closeReader()">SAIR</button>
            <button class="btn btn-audio" id="btn-audio" onclick="toggleAudio()">🔊 OUVIR</button>
        </div>
        
        <div id="touch-layer"></div>
        <div id="viewer"></div>

        <div class="footer-nav">
            <div class="pages-info" id="page-counter">Página -- de --</div>
            <div class="controls">
                <button class="btn btn-page" onclick="prev()">⬅</button>
                <button class="btn btn-page" onclick="next()">➡</button>
            </div>
        </div>
    </div>

    <script>
        const USER = 'felipekoch24', REPO = 'LEITOR_NANDA_IOS';
        let rendition, currentBook, isReading = false;
        let startX = 0;

        async function openBook(url, name) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('reader-screen').style.display = 'flex';
            
            if(currentBook) currentBook.destroy();
            
            currentBook = ePub(url);
            rendition = currentBook.renderTo("viewer", {
                width: "100%", height: "100%", flow: "paginated", manager: "default", spread: "none"
            });

            rendition.themes.default({
                "body": { "padding": "40px !important", "background": "#1a1a1a !important" },
                "p": { "font-size": "38px !important", "line-height": "1.5 !important", "color": "#ffffff !important" }
            });

            const savedPos = localStorage.getItem('pos_' + name);
            await rendition.display(savedPos || undefined);

            currentBook.ready.then(() => currentBook.locations.generate(1000)).then(() => updateProgress(name));
            rendition.on("relocated", () => updateProgress(name));
        }

        // Navegação Touch
        const touchLayer = document.getElementById('touch-layer');
        touchLayer.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        touchLayer.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) next(); else prev();
            } else {
                if (endX > window.innerWidth * 0.8) next();
                if (endX < window.innerWidth * 0.2) prev();
            }
        });

        function updateProgress(name) {
            if (rendition && rendition.currentLocation()) {
                const loc = rendition.currentLocation();
                document.getElementById('page-counter').innerText = `Página ${loc.start.displayed.page} de ${loc.start.displayed.total}`;
                if(name) localStorage.setItem('pos_' + name, loc.start.cfi);
            }
        }

        function next() { stopAudio(); rendition.next(); }
        function prev() { stopAudio(); rendition.prev(); }

        function stopAudio() {
            window.speechSynthesis.cancel();
            isReading = false;
            document.getElementById('btn-audio').innerText = "🔊 OUVIR";
        }

        // --- SISTEMA DE ÁUDIO REPARADO ---
        function toggleAudio() {
            if (isReading) { stopAudio(); return; }
            
            const loc = rendition.currentLocation();
            if (!loc) return;

            // Pega o texto da página atual via ePub.js (mais seguro que iframe)
            currentBook.getRange(loc.start.cfi).then(range => {
                let text = range.toString().trim();

                // Se o range falhar, tenta pegar do capítulo (Spine) como backup
                if (text.length < 5) {
                    return currentBook.spine.get(loc.start.cfi).load(currentBook.load.bind(currentBook)).then(doc => {
                        return doc.body.innerText || doc.body.textContent;
                    });
                }
                return text;
            }).then(text => {
                if (text && text.trim().length > 5) {
                    const utter = new SpeechSynthesisUtterance(text.trim());
                    utter.lang = 'pt-BR';
                    utter.rate = 1.0;

                    utter.onstart = () => {
                        isReading = true;
                        document.getElementById('btn-audio').innerText = "⏹ PARAR";
                    };
                    utter.onend = () => {
                        isReading = false;
                        document.getElementById('btn-audio').innerText = "🔊 OUVIR";
                    };

                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utter);
                } else {
                    alert("Toque na tela ou mude a página para o áudio carregar.");
                }
            }).catch(e => {
                console.error(e);
                alert("Erro ao carregar áudio. Tente novamente.");
            });
        }

        function closeReader() { stopAudio(); location.reload(); }

        async function fetchBooks() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const files = await res.json();
                const container = document.getElementById('lista-nuvem');
                container.innerHTML = '';
                files.forEach(f => {
                    if (f.name.toLowerCase().endsWith('.epub')) {
                        container.innerHTML += `<div class="item-livro" onclick="openBook('${f.download_url}', '${f.name}')"><b>${f.name.replace('.epub', '')}</b><span>LER 📖</span></div>`;
                    }
                });
            } catch(e) {}
        }
        fetchBooks();
    </script>
</body>
</html>
