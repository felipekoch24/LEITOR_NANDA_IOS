<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLIOTECA DA NANDA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #282a36; color: #f8f8f2; font-family: system-ui, sans-serif; }
        
        #main-screen { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #ff79c6; width: 100%; padding-bottom: 15px; }
        h1 { color: #ff79c6; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-upload { 
            width: 100%; max-width: 400px; background: linear-gradient(135deg, #ff79c6 0%, #bd93f9 100%);
            color: #282a36; text-align: center; padding: 18px; border-radius: 15px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; display: block;
        }

        .lista { width: 100%; max-width: 400px; display: grid; gap: 10px; }
        .item-livro { 
            background: #44475a; border-radius: 12px; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            border: 1px solid #6272a4;
        }

        /* LEITOR */
        #reader-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf6e3; z-index: 1000; flex-direction: column; }
        #viewer { flex: 1; width: 100%; }
        .nav-bar { height: 60px; background: #282a36; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .btn-nav { background: #ff79c6; color: #282a36; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .btn-close { background: #ff5555; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-screen">
        <header>
            <h1>BIBLIOTECA DA NANDA</h1>
            <p style="font-size: 10px; color: #6272a4; margin-top: 5px;">PDF & EPUB • ELITE</p>
        </header>

        <label for="file-input" class="btn-upload">📂 ABRIR LIVRO DO IPHONE</label>
        <input type="file" id="file-input" style="display:none" accept=".epub,.pdf">

        <div class="lista" id="lista-nuvem"></div>
    </div>

    <div id="reader-screen">
        <div class="nav-bar">
            <button class="btn-close" onclick="closeReader()">FECHAR</button>
            <div id="epub-controls" style="display: none; gap: 10px;">
                <button class="btn-nav" id="prev"> ← </button>
                <button class="btn-nav" id="next"> → </button>
            </div>
        </div>
        <div id="viewer"></div>
    </div>

    <script>
        const USER = 'felipekoch24';
        const REPO = 'LEITOR_NANDA_IOS';
        let rendition;

        function openBook(url, isPdf) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('reader-screen').style.display = 'flex';
            const viewer = document.getElementById('viewer');
            const controls = document.getElementById('epub-controls');
            viewer.innerHTML = "";

            if (isPdf) {
                controls.style.display = "none";
                viewer.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
            } else {
                controls.style.display = "flex";
                const book = ePub(url);
                rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
                rendition.display();
                document.getElementById('next').onclick = () => rendition.next();
                document.getElementById('prev').onclick = () => rendition.prev();
            }
        }

        function closeReader() {
            document.getElementById('main-screen').style.display = 'flex';
            document.getElementById('reader-screen').style.display = 'none';
        }

        async function fetchBooks() {
            const container = document.getElementById('lista-nuvem');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/`);
                const files = await response.json();
                container.innerHTML = '';
                files.forEach(file => {
                    const ext = file.name.toLowerCase().split('.').pop();
                    if (ext === 'pdf' || ext === 'epub') {
                        const title = file.name.split('.')[0].replace(/_/g, ' ');
                        container.innerHTML += `
                            <div class="item-livro" onclick="openBook('${file.download_url}', ${ext === 'pdf'})">
                                <div>
                                    <div style="font-weight:bold; font-size:13px">${title}</div>
                                    <div style="font-size:9px; color:#ff79c6">${ext.toUpperCase()}</div>
                                </div>
                                <div style="color:#ff79c6; font-weight:bold">ABRIR</div>
                            </div>`;
                    }
                });
            } catch (e) { container.innerHTML = 'Erro ao carregar.'; }
        }

        document.getElementById('file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                openBook(url, file.name.toLowerCase().endsWith('.pdf'));
            }
        });

        fetchBooks();
    </script>
</body>
    </html>
